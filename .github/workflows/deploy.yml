name: Deploy to Railway

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway Redeploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          PROJECT_ID: "77c2c79f-7877-4208-b4a1-c83d36dc7c9e"
          SERVICE_ID: "380b2574-cba1-417a-8bd5-2a427da3c0f2"
          ENVIRONMENT_ID: "de44af6a-d8c7-4f36-b7a4-32c5498cf0ac"
        run: |
          echo "Fetching latest deployment..."
          DEPLOY_RESP=$(curl -s -X POST "https://backboard.railway.com/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"query { deployments(input: {projectId: \\\"$PROJECT_ID\\\", serviceId: \\\"$SERVICE_ID\\\", environmentId: \\\"$ENVIRONMENT_ID\\\"}, first: 1) { edges { node { id status canRedeploy } } } }\"}")
          
          echo "Deployments response: $DEPLOY_RESP"
          
          DEPLOYMENT_ID=$(echo "$DEPLOY_RESP" | jq -r '.data.deployments.edges[0].node.id')
          CAN_REDEPLOY=$(echo "$DEPLOY_RESP" | jq -r '.data.deployments.edges[0].node.canRedeploy')
          
          echo "Deployment ID: $DEPLOYMENT_ID"
          echo "Can Redeploy: $CAN_REDEPLOY"
          
          if [ -z "$DEPLOYMENT_ID" ] || [ "$DEPLOYMENT_ID" = "null" ]; then
            echo "ERROR: No deployment found"
            exit 1
          fi
          
          if [ "$CAN_REDEPLOY" = "true" ]; then
            echo "Triggering redeploy for deployment $DEPLOYMENT_ID..."
            REDEPLOY_RESP=$(curl -s -X POST "https://backboard.railway.com/graphql/v2" \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"mutation { deploymentRedeploy(id: \\\"$DEPLOYMENT_ID\\\") { id status } }\"}")
            echo "Redeploy response: $REDEPLOY_RESP"
          else
            echo "Cannot redeploy, trying environmentTriggersDeploy..."
            TRIGGER_RESP=$(curl -s -X POST "https://backboard.railway.com/graphql/v2" \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"mutation { environmentTriggersDeploy(input: {projectId: \\\"$PROJECT_ID\\\", environmentId: \\\"$ENVIRONMENT_ID\\\", serviceId: \\\"$SERVICE_ID\\\"}) }\"}")
            echo "Trigger response: $TRIGGER_RESP"
          fi
