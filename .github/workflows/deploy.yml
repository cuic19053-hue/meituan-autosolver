name: Deploy to Railway

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Connect and Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          PROJECT_ID: "77c2c79f-7877-4208-b4a1-c83d36dc7c9e"
          SERVICE_ID: "380b2574-cba1-417a-8bd5-2a427da3c0f2"
          ENVIRONMENT_ID: "de44af6a-d8c7-4f36-b7a4-32c5498cf0ac"
        run: |
          echo "Connecting service to GitHub repo..."
          CONNECT_RESP=$(curl -s -X POST "https://backboard.railway.com/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceConnect(id: \\\"$SERVICE_ID\\\", input: { repo: \\\"cuic19053-hue/meituan-autosolver\\\", branch: \\\"master\\\" }) { id name } }\"}")
          echo "Connect response: $CONNECT_RESP"
          
          echo "Triggering deploy..."
          DEPLOY_RESP=$(curl -s -X POST "https://backboard.railway.com/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceDeployV2(input: {projectId: \\\"$PROJECT_ID\\\", environmentId: \\\"$ENVIRONMENT_ID\\\", serviceId: \\\"$SERVICE_ID\\\"}) }\"}")
          echo "Deploy response: $DEPLOY_RESP"
